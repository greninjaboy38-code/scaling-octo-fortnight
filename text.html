<!Doctype html>
<html>

<head>
    <title>Make changes to the rectangle</title>

    <style>
        h1{
            font-size:75px;
            color:aqua; 
            text-transform: uppercase;
            text-shadow:5px 5px red; 
        } 

        .tagline{
            font-weight:bold;
            text-align:center;
            font-style:italic;
        }
        .impt{
            text-decoration: underline;
            font-size: 40px;
            text-align: center;
            transform: rotate(15deg);

        </style>


</head>

<body bgcolor="gold">
    <h1>Thunder Kid</h1>
    <p class="tagline"> Most powerful kid in school</p>
    <p class="impt"> Super power</p>

</body>

</html>
